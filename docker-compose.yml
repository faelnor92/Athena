# Déploiement auto-hébergé de Athena v2.
#
# Prérequis :
#   1. Copier .env.example -> .env et définir au minimum ADMIN_PASSWORD
#      (obligatoire car le conteneur écoute sur 0.0.0.0) et tes clés LLM.
#   2. Définir ATHENA_DATA = chemin ABSOLU sur l'hôte pour l'état persistant.
#      (Il est monté au MÊME chemin dans le conteneur : indispensable pour que
#       la sandbox Docker — pilotée via le socket hôte — puisse monter le
#       workspace dans ses conteneurs jetables.)
#      Exemple dans .env :  ATHENA_DATA=/opt/athena/data
#
# Lancement :  docker compose up -d --build
# Accès :      http://localhost:8000  (ou derrière un reverse-proxy HTTPS)

services:
  athena:
    build: .
    container_name: athena
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      ATHENA_DATA: "${ATHENA_DATA:?Définis ATHENA_DATA=/chemin/absolu dans .env}"
      # Tout l'état persistant vit sous ATHENA_DATA (chemin identique hôte/conteneur).
      CONVERSATIONS_PATH: "${ATHENA_DATA}/conversations.json"
      CORE_MEMORY_PATH: "${ATHENA_DATA}/core_memory.json"
      CHROMA_DB_PATH: "${ATHENA_DATA}/chroma"
      RUNS_DB_PATH: "${ATHENA_DATA}/runs.sqlite3"
      # État partagé multi-worker (comptes, quotas, sessions, routines, invitations,
      # projets partagés, config par-utilisateur, pipelines) — DOIT persister sur le volume.
      STATE_DB_PATH: "${ATHENA_DATA}/athena_state.sqlite3"
      ROUTINES_PATH: "${ATHENA_DATA}/routines.json"
      ACTIVE_WORKSPACE_DIR: "${ATHENA_DATA}/workspace"
      LOG_DIR: "${ATHENA_DATA}/logs"
      MCP_CONFIG_PATH: "${ATHENA_DATA}/mcp_servers.json"
      CHANNEL_POLICIES_PATH: "${ATHENA_DATA}/channel_policies.json"
      # RAG en mode SERVEUR (sûr en multi-worker) : tous les workers parlent au service chroma.
      CHROMA_SERVER_HOST: "chroma"
      CHROMA_SERVER_PORT: "8000"
    depends_on:
      - chroma
    volumes:
      # Même chemin hôte/conteneur => la sandbox (socket hôte) peut monter le workspace.
      - "${ATHENA_DATA}:${ATHENA_DATA}"
      # Socket Docker : exécution de la sandbox en conteneurs frères sur l'hôte.
      - "/var/run/docker.sock:/var/run/docker.sock"

  # Base vectorielle (RAG) en mode serveur — partagée par tous les workers Athena.
  chroma:
    image: chromadb/chroma:0.5.0
    container_name: athena-chroma
    restart: unless-stopped
    volumes:
      - "${ATHENA_DATA}/chroma:/chroma/chroma"

  # Observabilité LLM OPTIONNELLE (OpenInference → Phoenix). Démarrer avec :
  #   docker compose --profile observability up -d
  # puis dans .env : OPENINFERENCE_ENABLED=true et
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006/v1/traces
  # UI Phoenix accessible sur http://localhost:6006
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: athena-phoenix
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "6006:6006"
