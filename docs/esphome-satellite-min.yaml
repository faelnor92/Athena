# Satellite ESP32-S3 piloté DIRECTEMENT par Athena (voix), capteurs visibles aussi par HA.
# Généré par Athena pour « salon ». Adapte les broches (I2S + capteurs) à ta carte.
#
# Compiler + flasher (USB la 1re fois, OTA WiFi ensuite) :
#   pip install esphome
#   esphome run athena-satellite-salon.yaml
# Les capteurs restent diffusés à TOUS les clients API (HA ET Athena en parallèle).

esphome:
  name: athena-satellite-salon
  on_boot:
    - wait_until:
        condition:
          api.connected:
    - voice_assistant.start_continuous:


esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
api:
  encryption:
    key: "REMPLACE_PAR_TA_CLE"
ota:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- Audio (ADAPTE LES BROCHES) : micro I2S standard, sortie I2S numérique ---
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO18
    i2s_bclk_pin: GPIO2
  - id: i2s_out
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO7

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO8
    dac_type: external

# --- Wake word SERVEUR : l'ESP streame en continu, ATHENA détecte le mot ---
# (moteur côté serveur selon VOICE_WAKE_ENGINE : 'stt' par défaut → mot custom
#  « athena » par transcription ; ou 'openwakeword' pour un modèle efficace.)
voice_assistant:
  microphone: mic
  speaker: spk
  use_wake_word: false
