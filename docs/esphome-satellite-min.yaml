# Satellite Athena MINIMAL : voix seule (micro + haut-parleur). PAS de BME680, PAS de LED.
# Broches reprises du projet Printables "HA Voice with esphome" (ESP32-S3 N16R8 + INMP441 + MAX98357A).
#
# Déclenchement : BOUTON. Tu n'as pas de bouton dédié ? → on utilise le bouton "BOOT" (GPIO0)
# déjà présent sur la carte ESP32-S3-DevKitC. Zéro composant à ajouter.
#   (Alternatives sans bouton : voir la note en bas — pad tactile, ou wake word serveur.)
#
# Mise en service : Athena → Réglages ⚙️ → 🛰️ Satellites → "Générer une clé" → recopie-la
# dans api.encryption.key ci-dessous, flashe, puis ajoute le satellite (nom + IP + même clé).

substitutions:
  name: athena-satellite-salon
  friendly_name: Satellite Salon

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# N16R8 = 8 Mo PSRAM octal — nécessaire pour les buffers audio.
psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: "COLLE_ICI_LA_CLE_BASE64"   # la même que dans Athena

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ---------------- AUDIO (broches du projet) ----------------
i2s_audio:
  - id: i2s_in            # micro INMP441
    i2s_lrclk_pin: GPIO18 # WS
    i2s_bclk_pin: GPIO2   # SCK
  - id: i2s_out           # ampli MAX98357A
    i2s_lrclk_pin: GPIO6  # LRC
    i2s_bclk_pin: GPIO7   # BCLK

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4    # SD du INMP441
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    channel: left

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO8   # DIN du MAX98357A
    dac_type: external

# ---------------- VOIX (pilotée par Athena) ----------------
voice_assistant:
  microphone: mic
  speaker: spk
  use_wake_word: false    # push-to-talk au bouton

# Bouton BOOT de la carte (GPIO0) en push-to-talk : appuyé = écoute, relâché = stop.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true       # BOOT relie GPIO0 à GND quand pressé
    name: "Parler"
    on_press:
      - voice_assistant.start
    on_release:
      - voice_assistant.stop

# ----------------------------------------------------------------------------
# SANS bouton du tout ? Deux options :
#
# 1) PAD TACTILE (un simple fil/zone métallique à toucher, aucun bouton) :
#      esp32_touch:
#      binary_sensor:
#        - platform: esp32_touch
#          name: "Toucher pour parler"
#          pin: GPIO4          # ⚠️ choisis une broche TACTILE LIBRE (pas une déjà utilisée)
#          threshold: 1000     # à calibrer
#          on_press: [ voice_assistant.start ]
#          on_release: [ voice_assistant.stop ]
#
# 2) MAINS-LIBRES (wake word) : il faut un déclenchement automatique. Deux voies :
#    - wake word EMBARQUÉ (micro_wake_word, ex. "hey jarvis") → fiable, mais config plus lourde
#      (c'est ce que fait le YAML du projet HA) ;
#    - wake word CÔTÉ SERVEUR (l'ESP streame en continu, Athena détecte le mot) → à activer
#      plus tard si Athena l'expose. Dis-le moi si tu veux qu'on parte sur le mains-libres.
