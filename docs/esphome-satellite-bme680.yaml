# Satellite Athena (VOIX) + capteur BME680 (température / humidité / pression / qualité d'air)
# sur le MÊME ESP32-S3 (N16R8). Broches reprises du projet Printables "HA Voice with esphome".
#
# ARCHITECTURE :
#   - VOIX  → Athena : Athena se connecte à l'API native de l'ESP (clé de chiffrement) et joue
#     l'assistant (push-to-talk au bouton). Réglages ⚙️ → 🛰️ Satellites → "Générer une clé".
#   - CAPTEURS → Home Assistant : HA se connecte AUSSI au même ESP (intégration ESPHome, MÊME clé)
#     → les mesures BME680 apparaissent dans HA. L'API native ESPHome accepte plusieurs clients,
#     donc Athena (voix) et HA (capteurs) cohabitent sur le même ESP.
#   ⚠️ Côté HA : n'assigne PAS de pipeline "Assist" à cet ESP (sinon HA et Athena se battent
#      pour la voix). Les capteurs sont passifs → aucun conflit.
#
#   Ensuite, Athena LIT ces capteurs via son intégration HA (get_ha_state), et la VIGIE peut
#   alerter dessus (automatisation HA : CO2/COV élevé → POST /api/events).

substitutions:
  name: athena-satellite-salon
  friendly_name: Satellite Salon

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# N16R8 = 8 Mo de PSRAM octal — indispensable pour les buffers audio.
psram:
  mode: octal
  speed: 80MHz

logger:

# Clé : génère-la dans Athena (Réglages → 🛰️ Satellites → "Générer une clé"),
# recopie-la ICI, puis la MÊME dans Athena (UI) ET dans HA (ajout du device ESPHome).
api:
  encryption:
    key: "COLLE_ICI_LA_CLE_BASE64"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ---------------- AUDIO (broches du projet) ----------------
i2s_audio:
  - id: i2s_in            # micro INMP441
    i2s_lrclk_pin: GPIO18 # WS
    i2s_bclk_pin: GPIO2   # SCK
  - id: i2s_out           # ampli MAX98357A
    i2s_lrclk_pin: GPIO6  # LRC
    i2s_bclk_pin: GPIO7   # BCLK

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4    # SD du INMP441
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    channel: left

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO8   # DIN du MAX98357A
    dac_type: external

# ---------------- VOIX (pilotée par Athena) ----------------
voice_assistant:
  microphone: mic
  speaker: spk
  use_wake_word: false          # push-to-talk au bouton (pas de wake word embarqué)
  on_listening:
    - light.turn_on: { id: status_led, red: 0%, green: 0%, blue: 100% }   # bleu : écoute
  on_tts_start:
    - light.turn_on: { id: status_led, red: 0%, green: 100%, blue: 60% }  # cyan : répond
  on_end:
    - light.turn_off: status_led

# Bouton push-to-talk (vol_up du projet = GPIO47)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO47
      mode: INPUT_PULLUP
      inverted: true
    name: "Parler"
    on_press:
      - voice_assistant.start
    on_release:
      - voice_assistant.stop

# ---------------- LED de statut (WS2812B, GPIO10 du projet) ----------------
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO10
    num_leds: 4
    rgb_order: GRB
    chipset: ws2812
    name: "LED statut"

# ---------------- CAPTEUR BME680 (I2C) → Home Assistant ----------------
# I2C sur 2 broches LIBRES (l'audio utilise 2,4,6,7,8 ; LED 10 ; boutons 47/21).
i2c:
  sda: GPIO15
  scl: GPIO16
  scan: true

sensor:
  - platform: bme680
    address: 0x77          # essaie 0x76 si "scan" ne le voit pas
    update_interval: 60s
    temperature:
      name: "${friendly_name} Température"
    humidity:
      name: "${friendly_name} Humidité"
    pressure:
      name: "${friendly_name} Pression"
    gas_resistance:
      name: "${friendly_name} Gaz (qualité air)"

# NOTE qualité d'air : le composant `bme680` ci-dessus donne la "résistance de gaz" (brute :
# plus c'est haut, plus l'air est propre). Pour un VRAI indice IAQ calibré (Bosch BSEC), remplace
# le bloc sensor par le composant `bme680_bsec2` (lib BSEC2) — plus précis mais setup plus lourd.
