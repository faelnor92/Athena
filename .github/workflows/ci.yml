name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite (unit + intégration + smoke)
        run: |
          rc=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            python "$t" || rc=1
            echo "::endgroup::"
          done
          exit $rc

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true   # informatif : n'échoue pas le build sur une CVE transitive
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install scanners
        run: pip install pip-audit bandit
      - name: Dependency & code scan
        run: bash scripts/security_scan.sh
