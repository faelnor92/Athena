name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser (chromium)
        run: python -m playwright install --with-deps chromium

      - name: Run test suite (pytest — unit + intégration + smoke)
        # pytest exécute TOUTE la suite via conftest.py (isolation hermétique) — seule façon
        # d'exercer les fixtures et de détecter les fuites inter-tests (la boucle
        # `python test_x.py` les ignorait). Sous-projet vendoré ha-mcp hors périmètre
        # (testpaths=tests dans pytest.ini). Tests réseau externes exclus (non déterministes ;
        # lançables en local avec `pytest tests/ -m network`).
        run: pytest tests/ -m "not network"

  security-scan:
    runs-on: ubuntu-latest
    # Le job ÉCHOUE sur les alertes BLOQUANTES : CVE de dépendance AVEC correctif publié
    # (un bump suffit), bandit HIGH/HIGH, secrets versionnés, .env suivi. Les CVE sans
    # correctif et bandit toutes-sévérités restent informatifs (cf. security_scan.sh) →
    # pas de faux échec sur une CVE transitive non corrigeable.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install scanners
        run: pip install pip-audit bandit
      - name: Dependency & code scan
        run: bash scripts/security_scan.sh

  docker-image-scan:
    # Scan Trivy de l'image applicative : CVE de l'OS de base (python:3.13-slim) et des
    # paquets installés, invisibles pour pip-audit. Bloquant sur CRITICAL corrigeable
    # uniquement (HIGH = informatif) — même philosophie que security_scan.sh.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t athena:ci .
      - name: Trivy — rapport complet (informatif)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: athena:ci
          format: table
          exit-code: "0"
      - name: Trivy — CRITICAL corrigeables (bloquant)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: athena:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
