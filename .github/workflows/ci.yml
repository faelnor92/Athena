name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser (chromium)
        run: python -m playwright install --with-deps chromium

      - name: Run test suite (pytest — unit + intégration + smoke)
        # pytest exécute TOUTE la suite via conftest.py (isolation hermétique) — seule façon
        # d'exercer les fixtures et de détecter les fuites inter-tests (la boucle
        # `python test_x.py` les ignorait). Sous-projet vendoré ha-mcp hors périmètre
        # (testpaths=tests dans pytest.ini). Tests réseau externes exclus (non déterministes ;
        # lançables en local avec `pytest tests/ -m network`).
        run: pytest tests/ -m "not network"

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true   # informatif : n'échoue pas le build sur une CVE transitive
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install scanners
        run: pip install pip-audit bandit
      - name: Dependency & code scan
        run: bash scripts/security_scan.sh
