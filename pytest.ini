[pytest]
# La suite du PROJET vit dans tests/ — on n'y inclut PAS le sous-projet vendoré
# tools/mcp-servers/ha-mcp (ses propres tests/dépendances, hors périmètre).
testpaths = tests
addopts = -q
markers =
    network: test qui sollicite le réseau externe (exclu par défaut en CI via -m "not network")
